name: Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Репозиторий с Go-исходником usque (org/repo) — только для ручного запуска'
        required: false
        default: 'eleutherifer/usque-android'
      upstream_ref:
        description: 'Ветка / тег / коммит — только для ручного запуска'
        required: false
        default: 'main'
  release:
    types: [ published ]

# Для push/PR/release эти значения не переопределить инпутами (у них их просто нет) —
# поэтому дефолты объявлены и здесь тоже, а не только в workflow_dispatch.inputs.
env:
  UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo || 'eleutherifer/usque-android' }}
  UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'main' }}
  GO_VERSION: '1.26.3'
  NDK_VERSION: '26.1.10909125'
  ANDROID_API: '24'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- Сборка usque.aar из исходников (заменяет собой файлы в app/libs) ----------

      - name: Checkout Go source (${{ env.UPSTREAM_REPO }}@${{ env.UPSTREAM_REF }})
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_REF }}
          path: usque-src

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: usque-src/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK ${{ env.NDK_VERSION }}
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> "$GITHUB_ENV"

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gomobile init
        run: gomobile init

      # ВАЖНО: собираем через относительный путь "./android", находясь ВНУТРИ каталога
      # с исходником — go.mod форка объявляет тот же module path, что и апстрим
      # (github.com/Diniboy1123/usque), и при сборке по полному пути снаружи gomobile
      # рискует утянуть настоящий апстрим через Go module proxy вместо нужного форка/ветки.
      - name: gomobile bind
        working-directory: usque-src
        run: |
          go get -tool golang.org/x/mobile/cmd/gobind
          go mod tidy
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          gomobile bind -v \
            -target=android/arm64,android/arm \
            -androidapi ${{ env.ANDROID_API }} \
            -o "$GITHUB_WORKSPACE/app/libs/usque.aar" \
            ./android

      - name: Извлечь usque-classes.jar из usque.aar
        working-directory: app/libs
        run: |
          unzip -p usque.aar jars/classes.jar > usque-classes.jar
          sha256sum usque.aar usque-classes.jar

      # ---------- Дальше — как раньше, без изменений: сборка/подпись APK ----------

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Check signing secrets
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore release keystore
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build debug APK
        if: ${{ steps.signing.outputs.has_signing != 'true' }}
        run: gradle --version && gradle clean assembleDebug --no-daemon

      - name: Build signed release APK
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --version && gradle clean assembleRelease --no-daemon

      - name: Prepare APK artifact
        run: |
          mkdir -p dist
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk dist/usque-android-app-ru-release.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk dist/usque-android-app-ru-release-unsigned.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk dist/usque-android-app-ru-debug.apk
          fi
          sha256sum dist/*.apk > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: usque-android-apk
          path: dist/*

      - name: Upload APK to versioned GitHub Release
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version_name="$(sed -n "s/^[[:space:]]*versionName[[:space:]]*['\"]\([^'\"]*\)['\"].*/\1/p" app/build.gradle | head -n 1)"
          if [ -z "$version_name" ]; then
            echo "Could not read versionName from app/build.gradle" >&2
            exit 1
          fi

          tag="v$version_name"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git tag -f "$tag" "$GITHUB_SHA"
            git push -f origin "refs/tags/$tag"
          fi

          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "Usque Android App $tag" \
              --notes "Automated APK build for $tag."
          else
            gh release edit "$tag" --target "$GITHUB_SHA"
          fi

          for apk in dist/*.apk; do
            base="$(basename "$apk" .apk)"
            cp "$apk" "dist/${base}-${tag}.apk"
          done
          sha256sum dist/*-${tag}.apk > "dist/SHA256SUMS-${tag}.txt"

          gh release upload "$tag" dist/*-${tag}.apk "dist/SHA256SUMS-${tag}.txt" --clobber
